<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Agenda</title>
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='%233b82f6'%3E%3Cpath d='M19 4h-1V2h-2v2H8V2H6v2H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2zm0 16H5V10h14v10zm0-12H5V6h14v2z'/%3E%3Crect x='7' y='12' width='2' height='2'/%3E%3Crect x='11' y='12' width='2' height='2'/%3E%3Crect x='15' y='12' width='2' height='2'/%3E%3Crect x='7' y='16' width='2' height='2'/%3E%3Crect x='11' y='16' width='2' height='2'/%3E%3C/svg%3E">
    <style>
      /* ============================================================
         VARIABLES & RESET
      ============================================================ */
      :root {
        --header-bg:  #1e293b;
        --sidebar-bg: #f8fafc;
        --border:     #e2e8f0;
        --time-w:     52px;
        --day-w:      192px;
        --slot-h:     24px;
        --head-h:     50px;
        --allday-h:   30px;
      }
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
      body, html {
        height: 100%; overflow: hidden;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        font-size: 13px; color: #1e293b; background: white;
      }
      .app { display: flex; flex-direction: column; height: 100vh; }

      /* TOPBAR */
      .topbar {
        background: var(--header-bg); color: white;
        padding: 8px 14px; flex-shrink: 0;
        display: flex; align-items: center; justify-content: space-between;
        gap: 10px; z-index: 100; position: relative;
      }
      .topbar-left, .topbar-right { display: flex; align-items: center; gap: 8px; }

      /* MAIN */
      .main { display: flex; flex: 1; overflow: hidden; }

      /* SIDEBAR */
      .sidebar {
        width: 230px; flex-shrink: 0;
        background: var(--sidebar-bg);
        border-right: 1px solid var(--border);
        overflow-y: auto; padding: 12px;
        transition: margin-left .3s, opacity .3s;
      }
      .sidebar.hidden { margin-left: -230px; opacity: 0; pointer-events: none; }

      /* Mini-cal */
      .mc-nav { display: flex; align-items: center; justify-content: space-between; margin-bottom: 6px; }
      .mc-nav span { font-size: 12px; font-weight: 700; color: #374151; }
      .mc-nav button { background: none; border: none; cursor: pointer; padding: 2px 7px; border-radius: 4px; font-size: 15px; color: #475569; }
      .mc-nav button:hover { background: #e2e8f0; }
      .mc-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 1px; font-size: 11px; text-align: center; }
      .mc-grid .mch { font-weight: 600; color: #94a3b8; padding: 2px 0; }
      .mc-grid .mcd { padding: 3px 0; border-radius: 50%; cursor: pointer; color: #374151; }
      .mc-grid .mcd:hover    { background: #dbeafe; }
      .mc-grid .mcd.today    { background: #3b82f6; color: white; font-weight: 700; }
      .mc-grid .mcd.other-mo { color: #cbd5e1; }

      /* Cal list */
      .cal-item { display: flex; align-items: center; gap: 7px; padding: 4px 5px; border-radius: 6px; }
      .cal-item:hover { background: #f1f5f9; }
      .cal-cb {
        width: 13px; height: 13px; border-radius: 3px;
        border: 2px solid #cbd5e1; appearance: none; cursor: pointer;
        position: relative; flex-shrink: 0; transition: all .15s;
      }
      .cal-cb:checked { background: var(--cc, #3b82f6); border-color: var(--cc, #3b82f6); }
      .cal-cb:checked::after { content: '✓'; position: absolute; top: -3px; left: 1px; color: white; font-size: 10px; font-weight: 700; }
      .sec-title { font-size: 10px; font-weight: 700; color: #94a3b8; text-transform: uppercase; letter-spacing: .08em; margin: 14px 0 6px; }

      /* CAL ZONE */
      #cal-wrap { flex: 1; display: flex; flex-direction: column; overflow: hidden; background: white; position: relative; }

      #cal-head { display: flex; flex-shrink: 0; border-bottom: 2px solid var(--border); background: white; z-index: 20; }
      .head-corner { width: var(--time-w); flex-shrink: 0; border-right: 1px solid var(--border); }
      #head-scroll { flex: 1; overflow: hidden; }
      #head-inner  { display: flex; }

      .day-head {
        width: var(--day-w); flex-shrink: 0; height: var(--head-h);
        display: flex; flex-direction: column; align-items: center; justify-content: center;
        border-right: 1px solid var(--border); cursor: pointer; user-select: none; transition: background .15s;
      }
      .day-head:hover    { background: #f8fafc; }
      .day-head.is-today { background: #eff6ff; }
      .day-head .dh-wd   { font-size: 10px; font-weight: 700; color: #64748b; text-transform: uppercase; letter-spacing: .05em; }
      .day-head .dh-d    { font-size: 19px; font-weight: 700; color: #1e293b; line-height: 1.1; }
      .day-head.is-today .dh-d { color: #3b82f6; }

      /* All-day */
      #allday-row { display: flex; flex-shrink: 0; border-bottom: 1px solid var(--border); background: #f8fafc; min-height: var(--allday-h); z-index: 18; }
      .allday-corner { width: var(--time-w); flex-shrink: 0; border-right: 1px solid var(--border); display: flex; align-items: center; justify-content: center; font-size: 9px; font-weight: 700; color: #94a3b8; text-transform: uppercase; }
      #allday-scroll { flex: 1; overflow: hidden; }
      #allday-inner  { display: flex; }
      .allday-cell { width: var(--day-w); flex-shrink: 0; border-right: 1px solid var(--border); padding: 2px 3px; display: flex; flex-direction: column; gap: 1px; min-height: var(--allday-h); }
      .allday-ev { border-radius: 3px; padding: 1px 5px; font-size: 11px; font-weight: 600; color: white; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; cursor: pointer; }

      /* Corps */
      #cal-body { display: flex; flex: 1; overflow: hidden; }

      /*
         Colonne heures : on ne scrolle plus via scrollTop JS.
         On utilise un seul conteneur scrollable (#body-scroll) qui
         contient ENSEMBLE la colonne heures ET la grille jours,
         de sorte qu'ils scrollent toujours de pair.
      */
      #body-scroll {
        display: flex; flex: 1; overflow: auto; position: relative;
      }
      #body-scroll::-webkit-scrollbar { width: 6px; height: 6px; }
      #body-scroll::-webkit-scrollbar-track { background: #f1f5f9; }
      #body-scroll::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 3px; }
      #body-scroll::-webkit-scrollbar-thumb:hover { background: #94a3b8; }

      /* La colonne heures est sticky horizontalement (ne bouge pas en X) */
      #time-col {
        width: var(--time-w); flex-shrink: 0;
        border-right: 1px solid var(--border);
        background: white; z-index: 10;
        position: sticky; left: 0;   /* épinglée à gauche lors du scroll X */
      }

      /* Chaque label = exactement 1 slot de hauteur */
      .t-label { height: var(--slot-h); position: relative; border-top: 1px solid #c8d4e0; }
      .t-label.half { border-top: 1px dashed #f1f5f9; }

      /* Labels heures : positionnés en absolu sur la ligne exacte */
      .t-label-txt {
        position: absolute;
        transform: translateY(-50%);   /* centré verticalement sur la ligne */
        right: 6px;
        font-size: 10px; font-weight: 600; color: #94a3b8; line-height: 1;
        white-space: nowrap;
        pointer-events: none;
      }
      .t-label.half .t-label-txt { display: none; }

      #days-scroll { flex: 1; overflow: visible; position: relative; }
      #days-scroll::-webkit-scrollbar { width: 6px; height: 6px; }
      #days-scroll::-webkit-scrollbar-track { background: #f1f5f9; }
      #days-scroll::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 3px; }
      #days-scroll::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
      #days-inner { display: flex; position: relative; }
      .day-col { flex-shrink: 0; width: var(--day-w); border-right: 1px solid var(--border); position: relative; }
      .day-col.is-today { background: rgba(59,130,246,.025); }
      .slot { height: var(--slot-h); border-top: 1px solid #c8d4e0; }
      .slot.half  { border-top: 1px dashed #f1f5f9; }
      .slot:hover { background: rgba(59,130,246,.05); cursor: pointer; }

      /* Events */
      .ev {
        position: absolute; left: 2px; right: 2px;
        border-radius: 4px; padding: 2px 5px;
        font-size: 11px; color: white; overflow: hidden;
        cursor: grab; z-index: 2;
        box-shadow: 0 1px 3px rgba(0,0,0,.15);
        transition: filter .15s, box-shadow .15s; user-select: none;
      }
      .ev:hover { filter: brightness(1.1); box-shadow: 0 2px 8px rgba(0,0,0,.22); z-index: 3; }
      .ev.dragging { opacity: .55; cursor: grabbing; z-index: 10; transition: none; }
      .ev.resizing { cursor: ns-resize; z-index: 10; transition: none; }
      .ev .ev-t { font-weight: 700; white-space: normal; overflow: hidden; display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; line-height: 1.3; word-break: break-word; }
      .ev .ev-h { font-size: 10px; opacity: .85; white-space: nowrap; }
      .ev .ev-d { font-size: 10px; opacity: .8; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-top: 1px; }
      .ev-resize { position: absolute; bottom: 0; left: 0; right: 0; height: 7px; cursor: ns-resize; background: rgba(255,255,255,.2); border-radius: 0 0 4px 4px; }
      .ev-resize:hover { background: rgba(255,255,255,.45); }
      #drag-ghost { position: absolute; border-radius: 4px; pointer-events: none; z-index: 20; border: 2px dashed rgba(255,255,255,.7); opacity: .55; display: none; }
      #now-bar { position: absolute; left: 0; right: 0; height: 2px; background: #ef4444; z-index: 4; pointer-events: none; }
      #now-bar::before { content: ''; position: absolute; left: -4px; top: -4px; width: 10px; height: 10px; border-radius: 50%; background: #ef4444; }

      /* Buttons */
      .vbtn { background: #334155; color: #94a3b8; padding: 5px 11px; font-size: 12px; font-weight: 600; border: none; cursor: pointer; transition: all .15s; border-right: 1px solid #1e293b; }
      .vbtn:first-child { border-radius: 7px 0 0 7px; }
      .vbtn:last-child  { border-radius: 0 7px 7px 0; border-right: none; }
      .vbtn:hover { background: #475569; color: white; }
      .vbtn.on    { background: #0f172a; color: white; }
      .nbtn { background: #334155; border: none; color: white; cursor: pointer; padding: 5px 10px; border-radius: 6px; font-size: 13px; }
      .nbtn:hover { background: #475569; }
      .btn { padding: 7px 14px; border-radius: 7px; font-size: 13px; font-weight: 600; cursor: pointer; border: none; transition: all .15s; }
      .btn-p { background: #3b82f6; color: white; } .btn-p:hover { background: #2563eb; }
      .btn-s { background: #e2e8f0; color: #475569; } .btn-s:hover { background: #cbd5e1; }
      .btn-d { background: #ef4444; color: white; } .btn-d:hover { background: #dc2626; }
      .btn-n { background: #475569; color: white; } .btn-n:hover { background: #334155; }
      #srch { background: #334155; color: white; border: none; border-radius: 7px; padding: 6px 30px 6px 10px; width: 190px; font-size: 12px; outline: none; }
      #srch::placeholder { color: #94a3b8; }
      #srch:focus { box-shadow: 0 0 0 2px #3b82f6; }
      .srch-wrap { position: relative; }
      .srch-icon { position: absolute; right: 9px; top: 50%; transform: translateY(-50%); color: #94a3b8; font-size: 12px; pointer-events: none; }

      /* Loading */
      #loading-overlay { position: absolute; inset: 0; z-index: 50; background: rgba(255,255,255,.55); display: none; align-items: center; justify-content: center; pointer-events: none; backdrop-filter: blur(1px); }
      #loading-overlay.on { display: flex; pointer-events: all; }
      .spinner { width: 36px; height: 36px; border: 3px solid #e2e8f0; border-top-color: #3b82f6; border-radius: 50%; animation: spin .7s linear infinite; }
      @keyframes spin { to { transform: rotate(360deg); } }

      /* Status */
      .sdot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
      .sd-ok { background: #22c55e; }
      .sd-sy { background: #fbbf24; animation: pulse 1.5s infinite; }
      .sd-er { background: #ef4444; }
      @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.3} }

      /* Toasts */
      #toast-box { position: fixed; top: 65px; right: 14px; z-index: 3000; display: flex; flex-direction: column; gap: 6px; }
      .toast { background: white; border-radius: 8px; padding: 9px 13px; box-shadow: 0 4px 14px rgba(0,0,0,.15); border-left: 4px solid; display: flex; align-items: center; gap: 7px; min-width: 210px; animation: sIn .25s ease; font-size: 13px; }
      .t-ok { border-color: #22c55e; } .t-er { border-color: #ef4444; } .t-wa { border-color: #fbbf24; } .t-in { border-color: #3b82f6; }
      @keyframes sIn  { from{transform:translateX(110%);opacity:0} to{transform:none;opacity:1} }
      @keyframes sOut { from{transform:none;opacity:1} to{transform:translateX(110%);opacity:0} }
      .toast.exit { animation: sOut .25s ease forwards; }

      /* Tooltip */
      #tip { position: fixed; z-index: 2500; background: #1e293b; color: white; padding: 6px 10px; border-radius: 6px; font-size: 12px; pointer-events: none; max-width: 240px; line-height: 1.4; display: none; box-shadow: 0 4px 12px rgba(0,0,0,.3); }

      /* Modal */
      #modal { display: none; position: fixed; inset: 0; z-index: 2000; background: rgba(0,0,0,.3); backdrop-filter: blur(2px); }
      .modal-box { background: white; margin: 6% auto; border-radius: 12px; width: 430px; max-height: 86vh; overflow-y: auto; box-shadow: 0 10px 30px rgba(0,0,0,.2); }
      .modal-head { padding: 16px 18px 12px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; }
      .modal-head h2 { font-size: 15px; font-weight: 700; }
      .modal-head button { background: none; border: none; font-size: 22px; cursor: pointer; color: #94a3b8; line-height: 1; }
      .modal-body { padding: 16px 18px; display: flex; flex-direction: column; gap: 12px; }
      .modal-foot { padding: 12px 18px; border-top: 1px solid var(--border); background: #f8fafc; border-radius: 0 0 12px 12px; display: flex; align-items: center; justify-content: space-between; }
      .field label { display: block; font-size: 11px; font-weight: 700; color: #64748b; margin-bottom: 3px; }
      input[type=text], input[type=date], textarea, select { width: 100%; border: 1px solid #cbd5e1; border-radius: 7px; padding: 6px 9px; font-size: 13px; color: #1e293b; outline: none; transition: border-color .15s, box-shadow .15s; font-family: inherit; }
      input:focus, textarea:focus, select:focus { border-color: #3b82f6; box-shadow: 0 0 0 3px rgba(59,130,246,.15); }
      .row2 { display: flex; gap: 10px; }
      .row2 > * { flex: 1; }
      .checks { display: flex; gap: 16px; align-items: center; }
      .chk { display: flex; align-items: center; gap: 5px; cursor: pointer; font-size: 13px; font-weight: 600; color: #475569; }
      .chk input { width: 14px; height: 14px; cursor: pointer; }

      /* Auth overlay */
      #auth-overlay { display: none; position: fixed; inset: 0; z-index: 9000; background: rgba(15,23,42,.9); backdrop-filter: blur(6px); align-items: center; justify-content: center; flex-direction: column; gap: 16px; }
      #auth-overlay.on { display: flex; }
      .auth-box { background: white; border-radius: 16px; padding: 40px; width: 360px; box-shadow: 0 24px 60px rgba(0,0,0,.4); text-align: center; }
      .auth-box h2 { font-size: 20px; font-weight: 700; margin-bottom: 8px; color: #1e293b; }
      .auth-box p  { font-size: 13px; color: #64748b; margin-bottom: 28px; line-height: 1.5; }
      .google-btn { display: flex; align-items: center; justify-content: center; gap: 10px; width: 100%; padding: 11px; border: 1.5px solid #e2e8f0; border-radius: 9px; background: white; font-size: 14px; font-weight: 600; color: #374151; cursor: pointer; transition: all .15s; }
      .google-btn:hover { background: #f8fafc; border-color: #cbd5e1; box-shadow: 0 2px 8px rgba(0,0,0,.08); }
      #auth-note { font-size: 12px; color: #94a3b8; max-width: 340px; text-align: center; line-height: 1.5; }

      /* ============================================================
         RESPONSIVE — MOBILE (OnePlus 11 : 412px largeur logique)
      ============================================================ */

      /* ── Sidebar mobile : drawer par-dessus le contenu ── */
      @media (max-width: 768px) {
        :root {
          --day-w:   120px;
          --time-w:  40px;
          --slot-h:  28px;
          --head-h:  44px;
        }

        /* Sidebar en overlay */
        .sidebar {
          position: fixed; top: 0; left: 0; bottom: 0;
          z-index: 500; width: 260px;
          box-shadow: 4px 0 20px rgba(0,0,0,.18);
          transform: translateX(0);
          transition: transform .28s ease, opacity .28s ease;
          margin-left: 0 !important; opacity: 1 !important;
          pointer-events: auto !important;
          padding-top: 60px;
        }
        .sidebar.hidden {
          transform: translateX(-100%);
          opacity: 0 !important;
          pointer-events: none !important;
        }
        /* Scrim derrière la sidebar */
        #sidebar-scrim {
          display: none;
          position: fixed; inset: 0; z-index: 499;
          background: rgba(0,0,0,.35);
        }
        #sidebar-scrim.on { display: block; }

        /* Topbar mobile : tout sur une ligne compacte */
        .topbar { padding: 8px 10px; gap: 6px; }
        .topbar-left { gap: 6px; }
        .topbar-right { gap: 5px; }

        /* Cacher la recherche dans la topbar sur mobile */
        .srch-wrap { display: none; }

        /* Cacher le groupe navigation centre (nav prev/today/next + search) */
        #topbar-center { display: none !important; }

        /* Centrage navigation : position static sur mobile */
        .topbar > div[style*="position:absolute"],
        .topbar > div[style*="position: absolute"] {
          position: static !important;
          transform: none !important;
          left: auto !important;
        }

        /* Boutons vues : plus compacts */
        .vbtn { padding: 5px 8px; font-size: 11px; }

        /* Barre de navigation inférieure mobile */
        #mobile-nav {
          display: flex;
          position: fixed; bottom: 0; left: 0; right: 0;
          height: var(--nav-h);
          background: var(--header-bg);
          border-top: 1px solid #334155;
          z-index: 400;
          align-items: center;
          justify-content: space-around;
          padding: 0 4px;
          padding-bottom: env(safe-area-inset-bottom, 0px);
        }
        #mobile-nav button {
          display: flex; flex-direction: column; align-items: center;
          gap: 3px; background: none; border: none; color: #94a3b8;
          font-size: 10px; font-weight: 600; cursor: pointer;
          padding: 6px 10px; border-radius: 8px; flex: 1;
          transition: color .15s, background .15s;
        }
        #mobile-nav button:active,
        #mobile-nav button.active { color: white; background: #334155; }
        #mobile-nav button svg { width: 20px; height: 20px; }

        /* Bouton + flottant */
        #fab {
          display: flex;
          position: fixed; bottom: calc(var(--nav-h) + 14px); right: 16px;
          width: 52px; height: 52px; border-radius: 50%;
          background: #3b82f6; color: white; border: none;
          font-size: 26px; align-items: center; justify-content: center;
          box-shadow: 0 4px 16px rgba(59,130,246,.45);
          cursor: pointer; z-index: 410;
          transition: transform .15s, box-shadow .15s;
        }
        #fab:active { transform: scale(.92); box-shadow: 0 2px 8px rgba(59,130,246,.4); }

        /* Bouton Créer de la topbar : caché sur mobile (remplacé par FAB) */
        .topbar-left .btn-p { display: none; }

        /* Le corps doit tenir compte de la barre du bas */
        .app { padding-bottom: var(--nav-h); }

        /* Modal plein écran sur mobile */
        .modal-box {
          width: 100%; margin: 0;
          border-radius: 20px 20px 0 0;
          position: fixed; bottom: 0; left: 0; right: 0;
          max-height: 92vh;
        }
        #modal { align-items: flex-end; }

        /* Inputs plus grands pour le touch */
        input[type=text], input[type=date], textarea, select {
          font-size: 16px; /* évite le zoom iOS/Android */
          padding: 9px 11px;
        }
        .btn { padding: 10px 16px; font-size: 14px; }

        /* Toasts en bas sur mobile */
        #toast-box { top: auto; bottom: calc(var(--nav-h) + 70px); right: 10px; left: 10px; }
        .toast { min-width: unset; }

        /* Auth box */
        .auth-box { width: calc(100vw - 32px); padding: 32px 24px; }

        /* Statut : cacher le texte, garder le dot */
        #stxt { display: none; }

        /* Bouton déconnexion caché dans topbar mobile (accessible via menu sidebar) */
        #btn-so { display: none !important; }

        /* Slot touch : un peu plus haut */
        .slot { height: var(--slot-h); }

        /* Scrollbar fine sur mobile */
        #days-scroll::-webkit-scrollbar { width: 3px; height: 3px; }
      }

      /* ── Desktop full HD (≥ 1080px) ── */
      @media (min-width: 1080px) {
        :root {
          --day-w:   200px;
          --slot-h:  26px;
          --head-h:  54px;
        }
        #mobile-nav { display: none; }
        #fab        { display: none; }
        /* Recherche plus large */
        #srch { width: 220px; }
      }

      /* Desktop normal (769px – 1079px) */
      @media (min-width: 769px) and (max-width: 1079px) {
        #mobile-nav { display: none; }
        #fab        { display: none; }
      }

      /* ── Touch events (drag & resize désactivés sur mobile) ── */
      @media (hover: none) {
        .ev { cursor: pointer; }
        .ev-resize { display: none; }
      }
    </style>
  </head>
  <body>
    <div class="app">

      <!-- TOPBAR -->
      <div class="topbar">
        <div class="topbar-left">
          <button onclick="toggleSidebar()" style="background:none;border:none;color:white;cursor:pointer;padding:4px 7px;border-radius:5px;font-size:18px;line-height:1;">☰</button>
          <strong style="font-size:15px;letter-spacing:-.02em;">Agenda</strong>

    <!--
      ============================================================
      GOOGLE IDENTITY SERVICES  (remplace l'ancien gapi.auth2)
      CLIENT_ID : à remplacer dans la config ci-dessous
      ============================================================
    -->
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <script>
    'use strict';

    /* ============================================================
       ⚙️  CONFIG — REMPLACER CLIENT_ID
       Voir README.md pour obtenir votre Client ID OAuth2
    ============================================================ */
    const CLIENT_ID = '1091567193044-n64qqmbd6pu8l2pkkocab6cnf0nj7qui.apps.googleusercontent.com';
    const SCOPES    = 'https://www.googleapis.com/auth/calendar';
    const API_BASE  = 'https://www.googleapis.com/calendar/v3';

    /* ============================================================
       CONSTANTES AFFICHAGE
    ============================================================ */
    const H_START   = 9;
    const H_END     = 23;
    let SLOT_H    = 24;
    let DAY_W     = 192;

    const DAYS_FR   = ['Dim','Lun','Mar','Mer','Jeu','Ven','Sam'];
    const MONTHS_FR = ['janvier','février','mars','avril','mai','juin',
                       'juillet','août','septembre','octobre','novembre','décembre'];
    const MONTHS_SH = ['Jan','Fév','Mar','Avr','Mai','Jun','Jul','Aoû','Sep','Oct','Nov','Déc'];

    /* ============================================================
       ÉTAT
    ============================================================ */
    let accessToken = null;
    let viewDays    = 21;
    let viewStart   = sod(new Date());
    let calendars   = [];
    let events      = [];
    let filter      = '';
    let sidebarVis  = true;
    let mcDate      = new Date();
    let debTimer    = null;

    /* ============================================================
       AUTH — Google Identity Services (token model)
       Persistance : sessionStorage (survit aux rechargements,
       effacé à la fermeture de l'onglet/navigateur)
    ============================================================ */
    let tokenClient = null;
    const SS_TOKEN  = 'gcal_access_token';
    const SS_EXPIRY = 'gcal_token_expiry';

    function saveToken(token, expiresIn) {
      const expiry = Date.now() + (expiresIn - 60) * 1000;
      sessionStorage.setItem(SS_TOKEN,  token);
      sessionStorage.setItem(SS_EXPIRY, String(expiry));
    }
    function loadToken() {
      const token  = sessionStorage.getItem(SS_TOKEN);
      const expiry = parseInt(sessionStorage.getItem(SS_EXPIRY) || '0', 10);
      if (token && Date.now() < expiry) return token;
      clearToken(); return null;
    }
    function clearToken() {
      sessionStorage.removeItem(SS_TOKEN);
      sessionStorage.removeItem(SS_EXPIRY);
    }

    function initGIS() {
      if (!window.google?.accounts?.oauth2) {
        setTimeout(initGIS, 200); return;
      }
      tokenClient = google.accounts.oauth2.initTokenClient({
        client_id: CLIENT_ID,
        scope: SCOPES,
        callback: (resp) => {
          if (resp.error) { showToast('Erreur auth : ' + resp.error, 'error'); return; }
          accessToken = resp.access_token;
          saveToken(resp.access_token, resp.expires_in || 3600);
          onSignedIn();
        }
      });

      // Restauration silencieuse depuis sessionStorage
      const saved = loadToken();
      if (saved) {
        accessToken = saved;
        onSignedIn();
      }

      // Auto-refresh : renouveler silencieusement 2 min avant expiration
      setInterval(() => {
        const expiry = parseInt(sessionStorage.getItem(SS_EXPIRY) || '0', 10);
        if (accessToken && Date.now() > expiry - 120000) {
          tokenClient.requestAccessToken({ prompt: '' });
        }
      }, 60000);
    }

    function doSignIn()  { if (tokenClient) tokenClient.requestAccessToken({ prompt: 'select_account' }); }
    function doSignOut() {
      if (!confirm('Se déconnecter ?')) return;
      if (accessToken) google.accounts.oauth2.revoke(accessToken);
      accessToken = null;
      clearToken();
      calendars = []; events = [];
      document.getElementById('auth-overlay').classList.add('on');
      document.getElementById('btn-so').style.display = 'none';
    }

    function onSignedIn() {
      document.getElementById('auth-overlay').classList.remove('on');
      document.getElementById('btn-so').style.display = 'inline-flex';
      populateTimes(document.getElementById('m-ts'));
      populateTimes(document.getElementById('m-te'));
      renderMiniCal();
      initResponsive();   // ← adapte la vue selon l'écran
      renderAll();
      loadCalendarList();
      setTimeout(scrollToNow, 150);
      setInterval(updateNowBar, 60000);
    }

    /* ============================================================
       API GOOGLE CALENDAR — wrappers fetch
    ============================================================ */
    async function gcalFetch(url, options = {}) {
      if (!accessToken) throw new Error('Non authentifié');
      const resp = await fetch(url, {
        ...options,
        headers: {
          'Authorization': 'Bearer ' + accessToken,
          'Content-Type': 'application/json',
          ...(options.headers || {})
        }
      });
      if (resp.status === 401) {
        // Token expiré → redemander
        accessToken = null;
        tokenClient.requestAccessToken();
        throw new Error('Session expirée, reconnexion en cours…');
      }
      if (!resp.ok) {
        const err = await resp.json().catch(() => ({}));
        throw new Error(err?.error?.message || `Erreur ${resp.status}`);
      }
      if (resp.status === 204) return null;
      return resp.json();
    }

    /* Récupère tous les calendriers de l'utilisateur */
    const LS_CAL_VIS = 'gcal_cal_visibility';
    const DEFAULT_HIDDEN = ["SA L'Hermine", 'Congés',
      'Jours fériés et autres fêtes en France', 'Exposition'];

    function loadCalVisibility() {
      try { return JSON.parse(localStorage.getItem(LS_CAL_VIS) || 'null'); }
      catch(e) { return null; }
    }
    function saveCalVisibility(cals) {
      const map = {};
      cals.forEach(c => { map[c.id] = c.visible; });
      localStorage.setItem(LS_CAL_VIS, JSON.stringify(map));
    }

    async function gcalGetCalendars() {
      const data    = await gcalFetch(`${API_BASE}/users/me/calendarList?maxResults=250`);
      const saved   = loadCalVisibility(); // null = première ouverture

      return (data.items || []).map(c => {
        let visible;
        if (saved && c.id in saved) {
          // Préférence déjà sauvegardée → la respecter
          visible = saved[c.id];
        } else {
          // Première ouverture → appliquer les masquages par défaut
          visible = !DEFAULT_HIDDEN.includes(c.summary);
        }
        return {
          id:      c.id,
          name:    c.summary || c.id,
          color:   c.backgroundColor || '#3b82f6',
          visible
        };
      });
    }

    /* Récupère les événements d'un calendrier sur une plage */
    async function gcalGetEvents(calId, timeMin, timeMax) {
      const params = new URLSearchParams({
        timeMin, timeMax,
        singleEvents: 'true',
        orderBy: 'startTime',
        maxResults: '2500'
      });
      const data = await gcalFetch(`${API_BASE}/calendars/${encodeURIComponent(calId)}/events?${params}`);
      const cal  = calendars.find(c => c.id === calId);
      const color = cal?.color || '#3b82f6';
      return (data.items || []).map(e => {
        const allDay = !e.start.dateTime;
        return {
          id:              e.id,
          calendarId:      calId,
          title:           e.summary || '(sans titre)',
          description:     e.description || '',
          start:           allDay ? e.start.date + 'T00:00:00.000Z' : e.start.dateTime,
          end:             allDay ? e.end.date   + 'T00:00:00.000Z' : e.end.dateTime,
          allDay,
          backgroundColor: color,
          borderColor:     color,
          textColor:       '#ffffff'
        };
      });
    }

    /* Crée un événement */
    async function gcalCreateEvent(calId, body) {
      return gcalFetch(
        `${API_BASE}/calendars/${encodeURIComponent(calId)}/events`,
        { method: 'POST', body: JSON.stringify(body) }
      );
    }

    /* Met à jour un événement */
    async function gcalUpdateEvent(calId, evId, body) {
      return gcalFetch(
        `${API_BASE}/calendars/${encodeURIComponent(calId)}/events/${encodeURIComponent(evId)}`,
        { method: 'PATCH', body: JSON.stringify(body) }
      );
    }

    /* Supprime un événement */
    async function gcalDeleteEvent(calId, evId) {
      return gcalFetch(
        `${API_BASE}/calendars/${encodeURIComponent(calId)}/events/${encodeURIComponent(evId)}`,
        { method: 'DELETE' }
      );
    }

    /* Déplace un événement vers un autre calendrier (copie + suppression) */
    async function gcalMoveEvent(oldCalId, newCalId, evId) {
      return gcalFetch(
        `${API_BASE}/calendars/${encodeURIComponent(oldCalId)}/events/${encodeURIComponent(evId)}/move?destination=${encodeURIComponent(newCalId)}`,
        { method: 'POST' }
      );
    }

    /* Construit le body Google Calendar API pour un événement */
    function buildGCalBody(data) {
      const body = { summary: data.title, description: data.description || '' };
      const startDate = parseLocalDate(data.startDate);
      const endDate   = parseLocalDate(data.endDate);
      if (data.allDay) {
        const daysDiff  = Math.round((endDate - startDate) / 86400000);
        const endExcl   = new Date(startDate); endExcl.setDate(endExcl.getDate() + daysDiff + 1);
        body.start = { date: fmtD(startDate) };
        body.end   = { date: fmtD(endExcl) };
      } else {
        const st = combineDateAndTime(startDate, data.startTime);
        const et = combineDateAndTime(endDate,   data.endTime);
        const tz = Intl.DateTimeFormat().resolvedOptions().timeZone;
        body.start = { dateTime: st.toISOString(), timeZone: tz };
        body.end   = { dateTime: et.toISOString(), timeZone: tz };
      }
      /* Récurrence RRULE */
      if (data.recurrence && data.recurrence !== 'none' && data.recurrenceEnd) {
        const freqMap = { daily:'DAILY', weekly:'WEEKLY', biweekly:'WEEKLY', monthly:'MONTHLY' };
        const freq    = freqMap[data.recurrence];
        const until   = data.recurrenceEnd.replace(/-/g, '') + 'T000000Z';
        let rule = `RRULE:FREQ=${freq};UNTIL=${until}`;
        if (data.recurrence === 'biweekly') rule += ';INTERVAL=2';
        body.recurrence = [rule];
      }
      return body;
    }

    /* ============================================================
       UTILITAIRES DATES
    ============================================================ */
    function sod(d) { const r=new Date(d); r.setHours(0,0,0,0); return r; }
    function addD(d,n){ const r=new Date(d); r.setDate(r.getDate()+n); return r; }
    function sameD(a,b){ return a.getFullYear()===b.getFullYear()&&a.getMonth()===b.getMonth()&&a.getDate()===b.getDate(); }
    function isToday(d){ return sameD(d,new Date()); }
    function pz(n){ return String(n).padStart(2,'0'); }
    function fmtD(d){ return `${d.getFullYear()}-${pz(d.getMonth()+1)}-${pz(d.getDate())}`; }
    function fmtT(d){ const tot=Math.round((d.getHours()*60+d.getMinutes())/15)*15; return `${pz(Math.floor(tot/60)%24)}:${pz(tot%60)}`; }
    function fmtTd(d){ return `${pz(d.getHours())}:${pz(d.getMinutes())}`; }
    function minToPx(m){ return (m/30)*SLOT_H; }
    function totalH(){ return (H_END-H_START)*2*SLOT_H; }

    function syncDisplayMetrics(){
      const rs=getComputedStyle(document.documentElement);
      const slot=parseFloat(rs.getPropertyValue('--slot-h'));
      const day=parseFloat(rs.getPropertyValue('--day-w'));
      if(!Number.isNaN(slot) && slot>0) SLOT_H=slot;
      if(!Number.isNaN(day) && day>0) DAY_W=day;
    }
    function parseLocalDate(s){ const p=s.split('-'); return new Date(+p[0],+p[1]-1,+p[2]); }
    function combineDateAndTime(date, ts){ const [h,m]=ts.split(':').map(Number); const r=new Date(date); r.setHours(h,m,0,0); return r; }

    /* ============================================================
       NAVIGATION
    ============================================================ */
    function nav(dir){ viewStart=addD(viewStart,dir*viewDays); renderAll(); loadEvents(); }
    function goToday(){ viewStart=sod(new Date()); renderAll(); loadEvents(); }
    function setView(n, btn){
      viewDays=n;
      document.querySelectorAll('.vbtn').forEach(b=>b.classList.remove('on'));
      btn.classList.add('on');
      if(n===7){ const dow=(viewStart.getDay()+6)%7; viewStart=addD(viewStart,-dow); }
      renderAll(); loadEvents();
      if(typeof updateMobileNavActive==='function') updateMobileNavActive();
    }

    /* ============================================================
       SIDEBAR / MINI-CAL
    ============================================================ */
    function toggleSidebar(){
      sidebarVis=!sidebarVis;
      document.getElementById('sidebar').classList.toggle('hidden',!sidebarVis);
    }
    function renderMiniCal(){
      const y=mcDate.getFullYear(), m=mcDate.getMonth();
      document.getElementById('mc-title').textContent=`${MONTHS_FR[m][0].toUpperCase()+MONTHS_FR[m].slice(1)} ${y}`;
      const g=document.getElementById('mc-grid'); g.innerHTML='';
      ['L','M','M','J','V','S','D'].forEach(h=>{ const el=document.createElement('div'); el.className='mch'; el.textContent=h; g.appendChild(el); });
      const first=new Date(y,m,1); const off=(first.getDay()+6)%7;
      for(let i=0;i<off;i++) addMcD(g,new Date(y,m,1-(off-i)),true);
      const dim=new Date(y,m+1,0).getDate();
      for(let d=1;d<=dim;d++) addMcD(g,new Date(y,m,d),false);
      const rem=(7-(off+dim)%7)%7;
      for(let i=1;i<=rem;i++) addMcD(g,new Date(y,m+1,i),true);
    }
    function addMcD(g,date,other){
      const el=document.createElement('div');
      el.className='mcd'+(other?' other-mo':'')+(isToday(date)?' today':'');
      el.textContent=date.getDate();
      el.onclick=()=>{ viewStart=sod(date); renderAll(); loadEvents(); };
      g.appendChild(el);
    }
    function mcPrev(){ mcDate.setMonth(mcDate.getMonth()-1); renderMiniCal(); }
    function mcNext(){ mcDate.setMonth(mcDate.getMonth()+1); renderMiniCal(); }

    /* ============================================================
       RENDU PRINCIPAL
    ============================================================ */
    function renderAll(){ syncDisplayMetrics(); renderHead(); renderAllday(); renderTimeCol(); renderDays(); bindScroll(); updateNowBar(); }

    function renderHead(){
      const inner=document.getElementById('head-inner');
      inner.innerHTML=''; inner.style.width=(viewDays*DAY_W)+'px';
      for(let i=0;i<viewDays;i++){
        const d=addD(viewStart,i);
        const c=document.createElement('div');
        c.className='day-head'+(isToday(d)?' is-today':'');
        c.style.width=DAY_W+'px';
        c.innerHTML=`<span class="dh-wd">${DAYS_FR[(d.getDay()+7)%7]}</span><span class="dh-d">${d.getDate()} ${MONTHS_SH[d.getMonth()]}</span>`;
        c.onclick=()=>{ viewStart=sod(d); viewDays=1; document.querySelectorAll('.vbtn').forEach(b=>b.classList.remove('on')); renderAll(); loadEvents(); };
        inner.appendChild(c);
      }
    }

    function renderAllday(){
      const inner=document.getElementById('allday-inner');
      inner.innerHTML=''; inner.style.width=(viewDays*DAY_W)+'px';
      for(let i=0;i<viewDays;i++){
        const d=addD(viewStart,i);
        const cell=document.createElement('div');
        cell.className='allday-cell'; cell.style.width=DAY_W+'px';
        cell.onclick=()=>openModal({start:d,end:d,allDay:true});
        events.filter(ev=>{
          if(!ev.allDay) return false;
          if(filter&&!ev.title.toLowerCase().includes(filter)) return false;
          const s=new Date(ev.start), e=ev.end?new Date(ev.end):s;
          return d>=sod(s)&&d<sod(e);
        }).forEach(ev=>{
          const chip=document.createElement('div');
          chip.className='allday-ev'; chip.style.background=ev.backgroundColor||'#64748b';
          chip.textContent=ev.title;
          chip.onclick=e2=>{e2.stopPropagation();openModal(null,true,ev);};
          cell.appendChild(chip);
        });
        inner.appendChild(cell);
      }
    }

    function renderTimeCol(){
      const inner=document.getElementById('time-inner');
      inner.innerHTML=''; inner.style.height=totalH()+'px';
      // On place le texte "Xh:00" sur la ligne du HAUT du slot correspondant.
      // Chaque slot fait SLOT_H px. Le label est positionné en absolu
      // à exactement minToPx((h - H_START)*60) px depuis le haut.
      const container=document.createElement('div');
      container.style.cssText='position:relative;height:'+totalH()+'px;';
      // Slots de fond (pour les bordures)
      for(let h=H_START;h<H_END;h++) for(let half=0;half<2;half++){
        const el=document.createElement('div');
        el.className='t-label'+(half?' half':'');
        el.style.height=SLOT_H+'px';
        container.appendChild(el);
      }
      // Labels positionnés en absolu exactement sur la ligne de l'heure
      for(let h=H_START;h<H_END;h++){
        const lbl=document.createElement('span');
        lbl.className='t-label-txt';
        lbl.textContent=`${pz(h)}:00`;
        lbl.style.top=minToPx((h-H_START)*60)+'px';
        container.appendChild(lbl);
      }
      inner.appendChild(container);
    }

    function renderDays(){
      const wrap=document.getElementById('days-inner');
      wrap.innerHTML=''; wrap.style.width=(viewDays*DAY_W)+'px'; wrap.style.height=totalH()+'px'; wrap.style.position='relative';
      for(let i=0;i<viewDays;i++){
        const d=addD(viewStart,i);
        const col=document.createElement('div');
        col.className='day-col'+(isToday(d)?' is-today':''); col.style.width=DAY_W+'px'; col.style.height=totalH()+'px';
        for(let h=H_START;h<H_END;h++) for(let half=0;half<2;half++){
          const sl=document.createElement('div'); sl.className='slot'+(half?' half':'');
          sl.onclick=()=>{ const start=new Date(d); start.setHours(h,half?30:0,0,0); openModal({start,end:new Date(start.getTime()+3600000),allDay:false}); };
          col.appendChild(sl);
        }
        const dayEvs=events.filter(ev=>{ if(ev.allDay) return false; if(filter&&!ev.title.toLowerCase().includes(filter)) return false; return sameD(new Date(ev.start),d); });
        computeLayout(dayEvs).forEach(({ev,col:c,cols:t})=>placeEvent(col,ev,c,t));
        wrap.appendChild(col);
      }
      for(let i=0;i<viewDays;i++) if(isToday(addD(viewStart,i))){
        const now=new Date(); const mins=(now.getHours()-H_START)*60+now.getMinutes();
        if(mins>=0&&mins<=(H_END-H_START)*60){
          const bar=document.createElement('div'); bar.id='now-bar';
          bar.style.top=minToPx(mins)+'px'; bar.style.left=(i*DAY_W)+'px'; bar.style.right=((viewDays-i-1)*DAY_W)+'px';
          wrap.appendChild(bar);
        }
        break;
      }
    }

    /* ============================================================
       LAYOUT CONFLITS
    ============================================================ */
    function computeLayout(evs){
      const sorted=[...evs].sort((a,b)=>new Date(a.start)-new Date(b.start));
      const result=[], columns=[];
      sorted.forEach(ev=>{
        const s=new Date(ev.start).getTime(), e=(ev.end?new Date(ev.end):new Date(s+1800000)).getTime();
        let placed=false;
        for(let c=0;c<columns.length;c++){
          if(!columns[c].some(o=>{ const os=new Date(o.start).getTime(),oe=(o.end?new Date(o.end):new Date(os+1800000)).getTime(); return s<oe&&e>os; })){
            columns[c].push(ev); result.push({ev,col:c,cols:0}); placed=true; break;
          }
        }
        if(!placed){ columns.push([ev]); result.push({ev,col:columns.length-1,cols:0}); }
      });
      result.forEach(item=>{
        const s=new Date(item.ev.start).getTime(),e=(item.ev.end?new Date(item.ev.end):new Date(s+1800000)).getTime();
        let mx=item.col;
        result.forEach(o=>{ const os=new Date(o.ev.start).getTime(),oe=(o.ev.end?new Date(o.ev.end):new Date(os+1800000)).getTime(); if(s<oe&&e>os) mx=Math.max(mx,o.col); });
        item.cols=mx+1;
      });
      return result;
    }

    function placeEvent(col,ev,colIdx=0,totalCols=1){
      const s=new Date(ev.start), e=ev.end?new Date(ev.end):new Date(s.getTime()+1800000);
      const sm=Math.max(0,(s.getHours()-H_START)*60+s.getMinutes());
      const em=Math.min((H_END-H_START)*60,(e.getHours()-H_START)*60+e.getMinutes());
      const dur=Math.max(15,em-sm);
      const gap=2, usable=DAY_W-4, w=Math.floor((usable-gap*(totalCols-1))/totalCols), left=2+colIdx*(w+gap);
      const el=document.createElement('div'); el.className='ev';
      el.style.top=minToPx(sm)+'px'; el.style.height=Math.max(22,minToPx(dur))+'px';
      el.style.background=ev.backgroundColor||'#3b82f6'; el.style.left=left+'px'; el.style.right='auto'; el.style.width=w+'px';
      el.dataset.evId=ev.id||''; el.dataset.calId=ev.calendarId||'';
      const desc=(ev.description||'').substring(0,60);
      el.innerHTML=`<div class="ev-t">${esc(ev.title)}</div><div class="ev-h">${fmtTd(s)} – ${fmtTd(e)}</div>${desc?`<div class="ev-d">${esc(desc)}</div>`:''}<div class="ev-resize"></div>`;
      el.addEventListener('mouseenter',ev2=>{ if(!dnd.active) showTip(ev2,ev); });
      el.addEventListener('mousemove', ev2=>{ if(!dnd.active) moveTip(ev2); });
      el.addEventListener('mouseleave',()=>{ if(!dnd.active) hideTip(); });
      el.querySelector('.ev-resize').addEventListener('mousedown',mde=>{ mde.stopPropagation(); mde.preventDefault(); hideTip(); startResize(mde,el,ev); });
      el.addEventListener('mousedown',mde=>{ if(mde.target.classList.contains('ev-resize')) return; mde.preventDefault(); hideTip(); startDrag(mde,el,ev); });
      col.appendChild(el);
    }

    /* ============================================================
       DRAG & DROP — DÉPLACEMENT
    ============================================================ */
    const dnd={active:false};

    function startDrag(mde,el,ev){
      const bs=document.getElementById('body-scroll');
      const ds=document.getElementById('days-scroll'), ghost=document.getElementById('drag-ghost');
      const rect=el.getBoundingClientRect(), dsRect=ds.getBoundingClientRect();
      const offsetY=mde.clientY-rect.top, startX=mde.clientX, startY=mde.clientY;
      let moved=false;
      const evDurMin=Math.round((new Date(ev.end||new Date(ev.start).getTime()+1800000)-new Date(ev.start))/60000);
      ghost.style.width=(DAY_W-4)+'px'; ghost.style.height=minToPx(evDurMin)+'px';
      ghost.style.background=ev.backgroundColor||'#3b82f6'; ghost.style.display='none';

      function onMove(mme){
        if(!moved&&Math.abs(mme.clientX-startX)<4&&Math.abs(mme.clientY-startY)<4) return;
        moved=true; hideTip(); el.classList.add('dragging'); ghost.style.display='block'; dnd.active=true;
        const relX=mme.clientX-dsRect.left+bs.scrollLeft, relY=mme.clientY-dsRect.top+bs.scrollTop-offsetY;
        const colIdx=Math.max(0,Math.min(viewDays-1,Math.floor(relX/DAY_W)));
        const snapMin=Math.max(0,Math.min((H_END-H_START)*60-evDurMin,Math.round((relY/SLOT_H)*30/15)*15));
        ghost.style.left=(colIdx*DAY_W+2)+'px'; ghost.style.top=minToPx(snapMin)+'px'; ghost.style.right='auto';
        dnd.colIdx=colIdx; dnd.snapMin=snapMin;
      }

      function onUp(){
        document.removeEventListener('mousemove',onMove); document.removeEventListener('mouseup',onUp);
        el.classList.remove('dragging'); ghost.style.display='none'; dnd.active=false;
        if(!moved){ openModal(null,true,ev); return; }
        const targetDay=addD(viewStart,dnd.colIdx);
        const newStart=new Date(targetDay); newStart.setHours(H_START+Math.floor(dnd.snapMin/60),dnd.snapMin%60,0,0);
        const newEnd=new Date(newStart.getTime()+evDurMin*60000);
        const idx=events.findIndex(x=>x.id===ev.id);
        if(idx!==-1){ events[idx].start=newStart.toISOString(); events[idx].end=newEnd.toISOString(); }
        renderDays(); renderAllday();
        setStatus('syncing','Déplacement…');
        const tz=Intl.DateTimeFormat().resolvedOptions().timeZone;
        gcalUpdateEvent(ev.calendarId, ev.id, {
          start:{ dateTime:newStart.toISOString(), timeZone:tz },
          end:  { dateTime:newEnd.toISOString(),   timeZone:tz }
        }).then(()=>setStatus('ok')).catch(err=>{ setStatus('error',err.message); loadEvents(); });
      }
      document.addEventListener('mousemove',onMove); document.addEventListener('mouseup',onUp);
    }

    /* ============================================================
       DRAG & DROP — REDIMENSIONNEMENT
    ============================================================ */
    function startResize(mde,el,ev){
      const bs=document.getElementById('body-scroll');
      const ds=document.getElementById('days-scroll'), dsRect=ds.getBoundingClientRect();
      let moved=false;
      const evStart=new Date(ev.start), startMin=(evStart.getHours()-H_START)*60+evStart.getMinutes();
      el.classList.add('resizing');

      function onMove(mme){
        moved=true; hideTip();
        const relY=mme.clientY-dsRect.top+bs.scrollTop;
        const endMin=Math.max(startMin+15,Math.min((H_END-H_START)*60,Math.round((relY/SLOT_H)*30/15)*15));
        el.style.height=Math.max(minToPx(15),minToPx(endMin-startMin))+'px';
        const newEnd=new Date(evStart); newEnd.setMinutes(newEnd.getMinutes()+(endMin-startMin));
        const hEl=el.querySelector('.ev-h'); if(hEl) hEl.textContent=`${fmtTd(evStart)} – ${fmtTd(newEnd)}`;
        el._resizeEndMin=endMin;
      }

      function onUp(){
        document.removeEventListener('mousemove',onMove); document.removeEventListener('mouseup',onUp);
        el.classList.remove('resizing');
        if(!moved||el._resizeEndMin===undefined) return;
        const newEnd=new Date(evStart); newEnd.setHours(H_START+Math.floor(el._resizeEndMin/60),el._resizeEndMin%60,0,0);
        const idx=events.findIndex(x=>x.id===ev.id); if(idx!==-1) events[idx].end=newEnd.toISOString();
        renderDays();
        setStatus('syncing','Redimensionnement…');
        const tz=Intl.DateTimeFormat().resolvedOptions().timeZone;
        gcalUpdateEvent(ev.calendarId, ev.id, {
          start:{ dateTime:evStart.toISOString(), timeZone:tz },
          end:  { dateTime:newEnd.toISOString(),   timeZone:tz }
        }).then(()=>setStatus('ok')).catch(err=>{ setStatus('error',err.message); loadEvents(); });
      }
      document.addEventListener('mousemove',onMove); document.addEventListener('mouseup',onUp);
    }

    function updateNowBar(){ const bar=document.getElementById('now-bar'); if(!bar) return; const now=new Date(); bar.style.top=minToPx((now.getHours()-H_START)*60+now.getMinutes())+'px'; }

    /* ============================================================
       SYNC SCROLL
    ============================================================ */
    function bindScroll(){
      const bs=document.getElementById('body-scroll');
      bs.onscroll=null;
      bs.addEventListener('scroll',()=>{
        // Sync horizontal : en-tête jours + all-day suivent body-scroll en X
        document.getElementById('head-scroll').scrollLeft   = bs.scrollLeft;
        document.getElementById('allday-scroll').scrollLeft = bs.scrollLeft;
        // Pas besoin de sync vertical : time-col est dans body-scroll (sticky left)
      },{passive:true});
    }
    function scrollToNow(){
      const now=new Date();
      const mins=(now.getHours()-H_START)*60+now.getMinutes()-60;
      document.getElementById('body-scroll').scrollTop=Math.max(0,minToPx(mins));
    }

       TOOLTIP
    ============================================================ */
    function showTip(e,ev){ const t=document.getElementById('tip'); const s=new Date(ev.start),en=ev.end?new Date(ev.end):null; t.innerHTML=`<strong>${esc(ev.title)}</strong><br>${fmtTd(s)}${en?' – '+fmtTd(en):''}${ev.description?'<br><span style="opacity:.8">'+esc(ev.description.substring(0,90))+'</span>':''}`; t.style.display='block'; moveTip(e); }
    function moveTip(e){ const t=document.getElementById('tip'); t.style.left=(e.clientX+14)+'px'; t.style.top=(e.clientY-10)+'px'; }

       RECHERCHE
    ============================================================ */

    /* ============================================================
       CHARGEMENT DONNÉES
    ============================================================ */
    async function loadCalendarList(){
      setStatus('syncing','Chargement…');
      try {
        calendars = await gcalGetCalendars();
        saveCalVisibility(calendars);   // ← mémorise l'état initial
        renderCalList();
        await loadEvents();
        setStatus('ok');
      } catch(e){ setStatus('error', e.message||'Erreur'); }
    }

    async function loadEvents(){
      const vis=calendars.filter(c=>c.visible).map(c=>c.id);
      if(!vis.length){ events=[]; renderDays(); renderAllday(); return; }
      const end=addD(viewStart,viewDays);
      setStatus('syncing','Chargement…');
      try {
        const allEvs = await Promise.all(vis.map(id => gcalGetEvents(id, viewStart.toISOString(), end.toISOString())));
        events = allEvs.flat();
        renderDays(); renderAllday(); setStatus('ok');
      } catch(e){ setStatus('error', e.message||'Erreur'); }
    }

    /* ============================================================
       LISTE CALENDRIERS
    ============================================================ */
    function renderCalList(){
      const wrap=document.getElementById('cal-list');
      const sorted=[...calendars].sort((a,b)=>{ if(a.visible!==b.visible) return b.visible?1:-1; return (a.name||'').localeCompare(b.name||'','fr',{sensitivity:'base'}); });
      wrap.innerHTML=sorted.map(c=>`
        <div class="cal-item">
          <input class="cal-cb" type="checkbox" ${c.visible?'checked':''} style="--cc:${c.color||'#3b82f6'};" data-id="${c.id}" onchange="toggleCal('${c.id}',this.checked)">
          <span style="width:9px;height:9px;border-radius:50%;background:${c.color||'#64748b'};flex-shrink:0;"></span>
          <span style="font-size:12px;color:#374151;font-weight:500;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${esc(c.name)}</span>
        </div>`).join('');
    }

    function toggleCal(id,vis){
      const c=calendars.find(x=>x.id===id); if(!c) return;
      c.visible=vis;
      saveCalVisibility(calendars);   // ← persiste la préférence
      renderCalList(); loadEvents();
    }

    /* ============================================================
       STATUS / TOASTS
    ============================================================ */
    function showLoading(){ document.getElementById('loading-overlay').classList.add('on'); }
    function hideLoading(){ document.getElementById('loading-overlay').classList.remove('on'); }
    function setStatus(s,msg){
      const dot=document.getElementById('sdot'),txt=document.getElementById('stxt');
      const m={syncing:{c:'sd-sy',t:msg||'Synchronisation…'},ok:{c:'sd-ok',t:msg||'Système OK'},error:{c:'sd-er',t:msg||'Erreur'}};
      const cfg=m[s]||m.ok; dot.className='sdot '+cfg.c; txt.textContent=cfg.t;
      if(s==='syncing') showLoading(); else hideLoading();
    }
    function showToast(msg,type='info',dur=3500){
      const box=document.getElementById('toast-box'), t=document.createElement('div');
      const cls={success:'t-ok',error:'t-er',warning:'t-wa',info:'t-in'}, ico={success:'✓',error:'✕',warning:'⚠',info:'ℹ'};
      t.className=`toast ${cls[type]||'t-in'}`; t.innerHTML=`<span>${ico[type]||''}</span><span>${esc(msg)}</span>`;
      box.appendChild(t); setTimeout(()=>{ t.classList.add('exit'); setTimeout(()=>t.remove(),260); },dur);
    }

    /* ============================================================
       MODAL
    ============================================================ */
    function openModal(info=null,isEdit=false,ev=null){
      const sel=document.getElementById('m-cal');
      sel.innerHTML=calendars.map(c=>`<option value="${c.id}">${esc(c.name)}</option>`).join('');
      resetModal();
      if(ev){
        const s=new Date(ev.start),e=ev.end?new Date(ev.end):null;
        document.getElementById('m-title').value=ev.title||'';
        document.getElementById('m-desc').value=ev.description||'';
        document.getElementById('m-id').value=ev.id||'';
        document.getElementById('m-old-cal').value=ev.calendarId||'';
        document.getElementById('m-ds').value=fmtD(s);
        document.getElementById('m-de').value=fmtD(s);
        if(ev.allDay){
          document.getElementById('m-ad').checked=true;
          document.getElementById('m-ts').disabled=true; document.getElementById('m-te').disabled=true;
          if(e){ const ae=new Date(e.getTime()-86400000); if(fmtD(ae)!==fmtD(s)){ document.getElementById('m-de').value=fmtD(ae); document.getElementById('m-md').checked=true; document.getElementById('row-de').style.display='flex'; } }
        } else {
          document.getElementById('m-ts').value=fmtT(s);
          if(e){ document.getElementById('m-te').value=fmtT(e); if(fmtD(s)!==fmtD(e)){ document.getElementById('m-de').value=fmtD(e); document.getElementById('m-md').checked=true; document.getElementById('row-de').style.display='flex'; } }
        }
        sel.value=ev.calendarId||'';
        document.getElementById('btn-del').style.display='inline-flex';
        document.getElementById('btn-dup').style.display='inline-flex';
        document.getElementById('modal-title').textContent="Modifier l'événement";
      } else if(info){
        document.getElementById('modal-title').textContent='Nouvel événement';
        if(info.allDay){ document.getElementById('m-ds').value=fmtD(info.start); document.getElementById('m-de').value=fmtD(info.start); document.getElementById('m-ad').checked=true; document.getElementById('m-ts').disabled=true; document.getElementById('m-te').disabled=true; }
        else if(info.start){ document.getElementById('m-ds').value=fmtD(info.start); document.getElementById('m-de').value=fmtD(info.start); document.getElementById('m-ts').value=fmtT(info.start); document.getElementById('m-te').value=fmtT(info.end||new Date(info.start.getTime()+3600000)); }
      } else {
        document.getElementById('modal-title').textContent='Nouvel événement';
        const now=new Date(); document.getElementById('m-ds').value=fmtD(now); document.getElementById('m-de').value=fmtD(now); document.getElementById('m-ts').value=fmtT(now); document.getElementById('m-te').value=fmtT(new Date(now.getTime()+3600000));
      }
      document.getElementById('modal').style.display='block';
      setTimeout(()=>document.getElementById('m-title').focus(),50);
    }

    function closeModal(){ document.getElementById('modal').style.display='none'; }
    function resetModal(){
      ['m-title','m-desc','m-id','m-old-cal'].forEach(id=>{ document.getElementById(id).value=''; });
      document.getElementById('m-ad').checked=false; document.getElementById('m-md').checked=false;
      document.getElementById('row-de').style.display='none'; document.getElementById('m-ts').disabled=false; document.getElementById('m-te').disabled=false;
      document.getElementById('m-rec').value='none'; document.getElementById('row-recend').style.display='none';
      document.getElementById('btn-del').style.display='none'; document.getElementById('btn-dup').style.display='none';
    }

    function onAlldayChange(){ const v=document.getElementById('m-ad').checked; document.getElementById('m-ts').disabled=v; document.getElementById('m-te').disabled=v; }
    function onMultidayChange(){ document.getElementById('row-de').style.display=document.getElementById('m-md').checked?'flex':'none'; }
    function onRecChange(){ document.getElementById('row-recend').style.display=document.getElementById('m-rec').value!=='none'?'block':'none'; }

    async function saveEvent(){
      const title=document.getElementById('m-title').value.trim();
      if(!title){ showToast('Le titre est obligatoire','error'); return; }
      const evId=document.getElementById('m-id').value, oldCal=document.getElementById('m-old-cal').value, calId=document.getElementById('m-cal').value;
      const allDay=document.getElementById('m-ad').checked, multi=document.getElementById('m-md').checked;
      const ds=document.getElementById('m-ds').value, de=multi?document.getElementById('m-de').value:ds;
      const data={ title, description:document.getElementById('m-desc').value, startDate:ds, endDate:de, startTime:document.getElementById('m-ts').value, endTime:document.getElementById('m-te').value, allDay, recurrence:document.getElementById('m-rec').value, recurrenceEnd:document.getElementById('m-rend').value };
      const body=buildGCalBody(data);
      setStatus('syncing','Enregistrement…');
      try {
        if(evId){
          if(oldCal!==calId){ await gcalMoveEvent(oldCal,calId,evId); await gcalUpdateEvent(calId,evId,body); }
          else { await gcalUpdateEvent(calId,evId,body); }
          showToast("Événement mis à jour",'success');
        } else {
          await gcalCreateEvent(calId,body);
          showToast('Événement créé','success');
        }
        closeModal(); await loadEvents(); setStatus('ok');
      } catch(e){ showToast('Erreur : '+(e.message||e),'error'); setStatus('error'); }
    }

    async function deleteCurrent(){
      if(!confirm('Supprimer cet événement ?')) return;
      const id=document.getElementById('m-id').value, calId=document.getElementById('m-cal').value;
      setStatus('syncing','Suppression…');
      try { await gcalDeleteEvent(calId,id); showToast('Événement supprimé','success'); closeModal(); await loadEvents(); setStatus('ok'); }
      catch(e){ showToast('Erreur : '+(e.message||e),'error'); setStatus('error'); }
    }

    async function duplicateCurrent(){
      const calId=document.getElementById('m-cal').value, allDay=document.getElementById('m-ad').checked, multi=document.getElementById('m-md').checked;
      const ds=document.getElementById('m-ds').value, de=multi?document.getElementById('m-de').value:ds;
      const data={ title:document.getElementById('m-title').value.trim()+' (copie)', description:document.getElementById('m-desc').value, startDate:ds, endDate:de, startTime:document.getElementById('m-ts').value, endTime:document.getElementById('m-te').value, allDay, recurrence:'none', recurrenceEnd:'' };
      setStatus('syncing','Duplication…');
      try { await gcalCreateEvent(calId,buildGCalBody(data)); showToast('Événement dupliqué','success'); closeModal(); await loadEvents(); setStatus('ok'); }
      catch(e){ showToast('Erreur : '+(e.message||e),'error'); setStatus('error'); }
    }

    /* ============================================================
       UTILITAIRES
    ============================================================ */
    function esc(s){ return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
    function populateTimes(sel){ sel.innerHTML=''; for(let h=0;h<24;h++) for(let m=0;m<60;m+=15){ const v=`${pz(h)}:${pz(m)}`; const o=document.createElement('option'); o.value=v; o.textContent=v; sel.appendChild(o); } }

    /* ============================================================
       INIT
    ============================================================ */
    document.addEventListener('keydown', e=>{ if(e.key==='Escape') closeModal(); });
    document.getElementById('modal').addEventListener('click', e=>{ if(e.target===document.getElementById('modal')) closeModal(); });
    initGIS();

    /* ============================================================
       RESPONSIVE — MOBILE
    ============================================================ */
    const isMobile = () => window.innerWidth <= 768;

    function initResponsive() {
      const nav = document.getElementById('mobile-nav');
      const fab = document.getElementById('fab');
      if (isMobile()) {
        nav.style.display = 'flex';
        fab.style.display = 'flex';
        // Vue par défaut mobile : 1 jour
        if (viewDays === 21) {
          viewDays = 1;
          viewStart = sod(new Date());
          document.querySelectorAll('.vbtn').forEach(b=>b.classList.remove('on'));
        }
        updateMobileNavActive();
      } else {
        nav.style.display = 'none';
        fab.style.display = 'none';
      }
    }

    function setMobileView(n) {
      viewDays = n;
      document.querySelectorAll('.vbtn').forEach(b=>b.classList.remove('on'));
      if(n===7){ const dow=(viewStart.getDay()+6)%7; viewStart=addD(viewStart,-dow); }
      renderAll(); loadEvents();
      updateMobileNavActive();
    }

    function updateMobileNavActive() {
      ['mnv-1','mnv-7'].forEach(id=>{
        const el=document.getElementById(id); if(!el) return;
        const n=parseInt(id.split('-')[1]);
        el.classList.toggle('active', viewDays===n);
      });
    }

    function closeSidebarMobile() {
      if(!isMobile()) return;
      sidebarVis = false;
      document.getElementById('sidebar').classList.add('hidden');
      document.getElementById('sidebar-scrim').classList.remove('on');
    }

    // Surcharge toggleSidebar pour mobile (scrim)
    const _toggleSidebarOrig = toggleSidebar;
    function toggleSidebar() {
      sidebarVis = !sidebarVis;
      document.getElementById('sidebar').classList.toggle('hidden', !sidebarVis);
      if (isMobile()) {
        document.getElementById('sidebar-scrim').classList.toggle('on', sidebarVis);
      }
    }

    // Touch swipe sur le calendrier (gauche/droite = nav)
    (function initSwipe() {
      const swipeEl = document.getElementById('body-scroll');
      let tx = 0, ty = 0;
      swipeEl.addEventListener('touchstart', e=>{
        tx = e.touches[0].clientX;
        ty = e.touches[0].clientY;
      }, {passive:true});
      swipeEl.addEventListener('touchend', e=>{
        const dx = e.changedTouches[0].clientX - tx;
        const dy = e.changedTouches[0].clientY - ty;
        if(Math.abs(dx) > Math.abs(dy) && Math.abs(dx) > 60) {
          nav(dx < 0 ? 1 : -1);
        }
      }, {passive:true});
    })();

    // Init au chargement et au resize
    window.addEventListener('resize', initResponsive);
    // initResponsive() est appelé dans onSignedIn() après le login

    </script>
  </body>
</html>
